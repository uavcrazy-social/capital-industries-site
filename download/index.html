<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Download Launcher | Capital Industries</title>
  <meta
    name="description"
    content="Download the Capital Industries custom launcher for the modded Minecraft server."
  >

  <style>
    :root {
      --bg: #0b0c0f;
      --bg-soft: #111319;
      --panel: #171a21;
      --text: #f4f4f5;
      --muted: #a7abb5;
      --orange: #ff8a18;
      --orange-bright: #ff9f2f;
      --line: #2a2f3a;
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 138, 24, 0.16), transparent 34rem),
        linear-gradient(180deg, #141720 0%, var(--bg) 58%);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    .card {
      width: min(780px, 100%);
      padding: clamp(28px, 5vw, 48px);
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(31, 35, 45, 0.96), rgba(17, 19, 25, 0.98));
      box-shadow: 0 24px 72px var(--shadow);
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--orange-bright);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 30px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 20px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      background: #12151c;
      font-weight: 700;
      text-decoration: none;
    }

    .button-primary {
      border-color: var(--orange);
      color: #111111;
      background: linear-gradient(180deg, var(--orange-bright), var(--orange));
      box-shadow: 0 12px 28px rgba(255, 138, 24, 0.22);
    }

    .button:hover,
    .button:focus {
      border-color: var(--orange);
      outline: none;
    }

    code {
      color: var(--orange-bright);
      font-family: Consolas, "Courier New", monospace;
    }

    @media (max-width: 640px) {
      .button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="card">
      <p class="eyebrow">Capital Industries Launcher</p>

      <h1>Download Launcher</h1>

      <p>
        Use the custom CCI Launcher to install and launch the server modpack
        with the intended configuration.
      </p>

      <p>
        Server address: <code>play.capitalindustries.net</code>
      </p>

      <nav class="actions" aria-label="Download and navigation links">
        <a class="button button-primary" href="/downloads/CCI-Launcher.exe" download>
          Download Windows Launcher
        </a>
        <a class="button" href="/">Back to Home</a>
        <a class="button" href="https://discord.gg/jj7fFEYYfk">Discord Help</a>
      </nav>
    </section>
  </main>
</body>
</html>
